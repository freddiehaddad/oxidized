# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md

  build-test:
    name: Build, Clippy, and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          override: true
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Rustfmt
        run: |
          cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: |
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: |
          cargo build --workspace --all-features --verbose

      - name: Test
        run: |
          cargo test --workspace --all-features --verbose

  coverage:
    name: Coverage (tarpaulin)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install tarpaulin (cargo)
        run: |
          cargo install cargo-tarpaulin --locked --version 0.30.0 || echo "tarpaulin already installed"
      - name: Run tarpaulin (generate Cobertura XML)
        run: |
          # Tarpaulin only officially supports Linux; this job runs on ubuntu-latest.
          # Using manual install instead of deprecated action (was failing to fetch 'latest' binary).
          cargo tarpaulin --workspace --all-features --out Xml --output-dir coverage --timeout 600
          # Normalize output file name to cobertura.xml for downstream steps.
          found=$(ls coverage/*.xml 2>/dev/null | head -1)
          if [ -z "$found" ]; then echo "No XML coverage report produced"; exit 1; fi
          cp "$found" cobertura.xml
      - name: Extract coverage & build badge json
        id: cov
        run: |
          # Extract line-rate attribute (0-1 float)
          rate=$(grep -o 'line-rate="[0-9.]*"' cobertura.xml | head -1 | sed 's/.*="\([0-9.]*\)"/\1/')
          pct=$(awk -v r="$rate" 'BEGIN { printf("%d", r*100 + 0.5) }')
          # Choose color (Rust-ish palette)
          color=orange
          if [ "$pct" -ge 90 ]; then color=brightgreen; elif [ "$pct" -ge 80 ]; then color=green; elif [ "$pct" -ge 70 ]; then color=yellow; fi
          mkdir -p badges
          cat > badges/coverage.json <<EOF
          {"schemaVersion":1,"label":"coverage","message":"${pct}%","color":"$color"}
          EOF
          echo "percent=$pct" >> $GITHUB_OUTPUT
      - name: Upload badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: badges/coverage.json

  publish-badges:
    name: Publish Badges (gh-pages)
    runs-on: ubuntu-latest
    needs: coverage
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: .
      - name: Commit badge to gh-pages
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@example.com"
          git fetch origin gh-pages || true
          if git show-ref --quiet refs/heads/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            rm -f .gitignore
          fi
          mkdir -p badges
          mv coverage.json badges/coverage.json
          git add badges/coverage.json
          git commit -m "ci: update coverage badge" || echo "No changes to commit"
          git push origin gh-pages
