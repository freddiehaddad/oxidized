[display]
show_line_numbers = false
show_relative_numbers = true
show_cursor_line = true
color_scheme = "default"
syntax_highlighting = true

[behavior]
tab_width = 4
expand_tabs = false
auto_indent = true
ignore_case = false
smart_case = false
highlight_search = true
incremental_search = true
wrap_lines = false
line_break = false

[editing]
undo_levels = 1000
persistent_undo = false
backup = false
swap_file = false
auto_save = false

[interface]
show_status_line = true
command_timeout = 1000
show_command = true
scroll_off = 3
side_scroll_off = 0
window_resize_amount = 1
completion_menu_width = 30
completion_menu_height = 8
# Enable '%' prefix in :e/:w path completion to root at current buffer.
# Toggle at runtime with :set ppr / :set noppr, query with :set ppr?
percent_path_root = true

[statusline]
# Toggle individual status line segments (all default to true).
# Indentation segment: shows Tabs/Spaces and width
show_indent = true
# End-of-line marker (placeholder until per-buffer EOL is tracked)
show_eol = true
# Encoding detection (ASCII vs UTF-8 heuristic)
show_encoding = true
# File type/language name
show_type = true
# Macro recording indicator (REC @x)
show_macro = true
# Search progress (i/N or N matches)
show_search = true
# File progress percentage
show_progress = true
# Separator between segments (default two spaces)
separator = "  "

[languages]
# Default language to use when no specific language can be detected
default_language = "text"

# File extension to language mapping
# Each entry maps file extensions to their corresponding language identifier
[languages.extensions]
"rs" = "rust"
"toml" = "toml"
"md" = "markdown"
"txt" = "text"
"json" = "json"
"yaml" = "yaml"
"yml" = "yaml"

# Content-based language detection patterns for unnamed files
[languages.content_patterns]
rust = ["fn ", "let ", "use ", "impl ", "struct ", "enum "]
toml = ["[", "="]
markdown = ["# ", "## ", "```"]
json = ["{", "\""]
