[display]
show_line_numbers = true
show_relative_numbers = true
show_cursor_line = true
color_scheme = "default"
syntax_highlighting = true
show_marks = true

[behavior]
tab_width = 4
expand_tabs = false
auto_indent = true
ignore_case = false
smart_case = false
highlight_search = true
incremental_search = true
wrap_lines = false
line_break = false

[editing]
undo_levels = 1000
persistent_undo = false
backup = false
swap_file = false
auto_save = false

[interface]
show_status_line = true
command_timeout = 1000
show_command = true
scroll_off = 3
side_scroll_off = 0
window_resize_amount = 1
completion_menu_width = 30
completion_menu_height = 8
percent_path_root = true
config_poll_ms = 500
syntax_poll_ms = 100

[languages]
default_language = "text"

[languages.extensions]
rs = "rust"
toml = "toml"
txt = "text"
yaml = "yaml"
md = "markdown"
json = "json"
yml = "yaml"

[languages.content_patterns]
json = [
    "{",
    '"',
]
toml = [
    "[",
    "=",
]
markdown = [
    "# ",
    "## ",
    "```",
]
rust = [
    "fn ",
    "let ",
    "use ",
    "impl ",
    "struct ",
    "enum ",
]

[statusline]
show_indent = true
show_eol = true
show_encoding = true
show_type = true
show_macro = true
show_search = true
show_progress = true
separator = "  "
