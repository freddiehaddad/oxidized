[advisories]
# Treat vulnerabilities as errors; others as warnings by default
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"
ignore = []

[licenses]
# Require every crate to have a license we allow
unlicensed = "deny"
copyleft = "deny"
default = "deny"
# Common permissive licenses allowed in this project
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
]
# Explicitly deny strong copyleft and SSPL
deny = ["GPL-3.0", "AGPL-3.0", "LGPL-3.0", "LGPL-2.1", "SSPL-1.0"]
# Confidence for text license detection
confidence-threshold = 0.8
# Per-crate exceptions can be added here if needed
exceptions = [
    # { name = "some-crate", version = "=1.2.3", allow = ["LicenseRef-custom"] },
]

[bans]
# Warn on multiple versions to keep tree tidy, but don't fail builds
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
skip-tree = []
