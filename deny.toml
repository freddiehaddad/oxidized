[advisories]
# Use current cargo-deny schema. All vulnerabilities are errors by default.
# Fail only when unmaintained applies to a direct workspace dependency.
unmaintained = "workspace"
yanked = "warn"
ignore = []

[licenses]
# Explicit allowlist of licenses permitted in the dependency graph.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
]
# Warn if an allowed license isn't actually used (helps keep allowlist lean)
unused-allowed-license = "warn"
# Confidence for text license detection
confidence-threshold = 0.8
# Per-crate exceptions can be added here if needed
exceptions = [
    # { crate = "some-crate@=1.2.3", allow = ["LicenseRef-custom"] },
]
# Optionally ignore license checks for unpublished/private workspace crates
[licenses.private]
ignore = true

[bans]
# Warn on multiple versions to keep tree tidy, but don't fail builds
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip = []
skip-tree = []
